<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Coffee Shop - Login</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:900&display=swap" rel="stylesheet">
  <style>
    /* Body styling to match main page */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    /* Header styling to match main page */
    .login-header {
      text-align: center;
      padding: 40px 20px 20px 20px;
      color: white;
    }
    
    .login-header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 3rem;
      margin: 0 0 10px 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      color: white;
      font-weight: 900;
    }
    
    .login-header p {
      font-size: 1.2rem;
      margin: 0;
      opacity: 0.9;
      color: white;
    }
    
    /* Login container styling */
    .login-container {
      max-width: 450px;
      width: 90%;
      padding: 40px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      margin-top: 20px;
    }
    
    .login-container h2 {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: #667eea;
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e1e5e9;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    
    .btn:hover {
      background: linear-gradient(135deg, #5a6fd8 0%, #6a4190 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .error-message {
      background-color: #fee;
      color: #c33;
      padding: 10px;
      border-radius: 5px;
      margin-top: 15px;
      border: 1px solid #fcc;
      display: none;
    }
    
    /* Password field with eye icon */
    .password-container {
      position: relative;
    }
    
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #667eea;
      font-size: 18px;
      user-select: none;
    }
    
    .password-toggle:hover {
      color: #5a6fd8;
    }
    
    /* Loading spinner for login button */
    .btn.loading {
      position: relative;
      color: transparent;
    }
    
    .btn.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    /* Responsive design */
    @media (max-width: 768px) {
      .login-header h1 {
        font-size: 2rem;
      }
      
      .login-container {
        padding: 30px 20px;
        margin: 10px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
  <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1563.0.min.js"></script>
  <script src="cognito-enhanced.js"></script>
</head>
<body>
  <div class="login-header">
    <h1>☕ Virtual Coffee Shop</h1>
    <p>Welcome back! Please sign in to continue.</p>
  </div>
  
  <div class="login-container">
    <h2>Sign In</h2>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-container">
          <input type="password" id="password" name="password" required>
          <span class="password-toggle" onclick="togglePassword()">👁️</span>
        </div>
      </div>
      
      <button type="submit" class="btn" id="login-button">
        Sign In
      </button>
      
      <div id="errorMessage" class="error-message"></div>
    </form>
  </div>

  <script>
    // Enhanced login functionality that works with existing cognito.js
    document.addEventListener('DOMContentLoaded', function() {
      const loginForm = document.getElementById('loginForm');
      const loginButton = document.getElementById('login-button');
      
      // Add loading state when form is submitted
      if (loginForm) {
        loginForm.addEventListener('submit', function(e) {
          // Add loading state
          loginButton.classList.add('loading');
          loginButton.disabled = true;
          
          // Remove loading state after 5 seconds if still present (fallback)
          setTimeout(() => {
            loginButton.classList.remove('loading');
            loginButton.disabled = false;
          }, 5000);
        });
      }
      
      // Check if user is already logged in
      if (sessionStorage.getItem('idToken')) {
        window.location.href = 'index.html';
      }
    });
    
    // Password toggle functionality
    function togglePassword() {
      const passwordField = document.getElementById('password');
      const toggleIcon = document.querySelector('.password-toggle');
      
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleIcon.textContent = '🙈';
      } else {
        passwordField.type = 'password';
        toggleIcon.textContent = '👁️';
      }
    }
  </script>
</body>
</html>
