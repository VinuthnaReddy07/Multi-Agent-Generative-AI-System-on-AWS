<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Coffee Shop</title>
  <!-- Montserrat font for flashy title -->
  <link href="https://fonts.googleapis.com/css?family=Montserrat:900&display=swap" rel="stylesheet">
  <!-- Enhanced styles -->
  <link rel="stylesheet" href="enhanced-styles.css">
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>

<body>
  <div class="main-container">
    <!-- Top Header with Title and Sign Out -->
    <div class="top-header">
      <div class="header-content">
        <h1 class="main-title">☕ Virtual Coffee Shop</h1>
        <p class="subtitle">Your favorite place for Coffee, Tea, and Donuts!</p>
      </div>
      <button id="signOutButton" class="bubble-btn signout-btn compact top-signout">
        <span class="btn-icon">👋</span>
        <span class="btn-text">Sign Out</span>
      </button>
    </div>
    
    <div class="chatbot-section">
      <div class="chatbot-header">
        <h2>BrewBot AI Agent</h2>
        <div class="user-controls-header">
          <div class="connection-status" id="connection-status">Connecting...</div>
          
          <!-- CloudWatch Dropdown Button -->
          <div class="dropdown-container">
            <button id="cloudwatchButton" class="bubble-btn cloudwatch-btn compact">
              <span class="btn-icon">📊</span>
              <span class="btn-text">CloudWatch</span>
              <span class="dropdown-arrow">▼</span>
            </button>
            <div id="cloudwatchDropdown" class="dropdown-menu">
              <a href="#" id="agentDashboardLink" class="dropdown-item">
                <span class="dropdown-icon">📈</span>
                Agent Dashboard
              </a>
              <a href="#" id="agentLogsLink" class="dropdown-item">
                <span class="dropdown-icon">📋</span>
                Agent Logs
              </a>
            </div>
          </div>
          
          <!-- Store Locator Dropdown Button -->
          <div class="dropdown-container">
            <button id="storeLocatorButton" class="bubble-btn store-locator-btn compact">
              <span class="btn-icon">📍</span>
              <span class="btn-text" id="selected-store-text">Select Store</span>
              <span class="dropdown-arrow">▼</span>
            </button>
            <div id="storeLocatorDropdown" class="dropdown-menu store-dropdown-menu">
              <!-- Store options will be populated by JavaScript -->
            </div>
          </div>
        </div>
      </div>
      
      <!-- Enhanced Chatbot Widget - Larger Size -->
      <div class="chatbot-container-main large" id="chatbot">
        <div class="chatbot-messages" id="chatbot-messages">
          <div class="bot-message" id="initial-greeting">Loading...</div>
        </div>
        <form class="chatbot-input-area" id="chatbot-form">
          <input type="text" id="chatbot-input" placeholder="Type your message..." autocomplete="off" required>
          <button type="submit">Send</button>
        </form>
      </div>
      
      <!-- Sample Prompts Section -->
      <div class="sample-prompts">
        <h3>Try these sample prompts to test BrewBot:</h3>
        <div class="prompt-buttons">
          <button class="prompt-btn" onclick="sendSamplePrompt('What if my drink arrives cold?')">What if my drink arrives cold?</button>
          <button class="prompt-btn" onclick="sendSamplePrompt('How much caffeine is in a typical drink?')">How much caffeine is in a typical drink?</button>
          <button class="prompt-btn" onclick="sendSamplePrompt('Does stores have public restrooms?')">Does stores have public restrooms?</button>
          <button class="prompt-btn" onclick="sendSamplePrompt('What are the different payment methods I can use?')">What are the different payment methods I can use?</button>
          <button class="prompt-btn" onclick="sendSamplePrompt('How can I use the promotions?')">How can I use the promotions?</button>
          <button class="prompt-btn" onclick="sendSamplePrompt('I want to place a large order for my office')">I want to place a large order for my office</button>
        </div>
      </div>
    </div>

    <!-- Menu Section -->
    <div class="menu-section">
      <h2>Our Menu</h2>
      <div class="menu-categories" id="menu-categories">
        <!-- Menu will be loaded dynamically -->
        <div class="loading-menu">Loading menu...</div>
      </div>
    </div>
  </div>

    function populateStoreDropdown() {
      const dropdown = document.getElementById('storeLocatorDropdown');
      if (!dropdown) return;
      
      // Group stores by city
      const storesByCity = {};
      storeData.forEach(store => {
        const cityState = `${store.city}, ${store.state}`;
        if (!storesByCity[cityState]) {
          storesByCity[cityState] = [];
        }
        storesByCity[cityState].push(store);
      });
      
      // Sort cities alphabetically
      const sortedCities = Object.keys(storesByCity).sort();
      
      let dropdownHTML = '';
      sortedCities.forEach(cityState => {
        dropdownHTML += `<div class="store-city-group">`;
        dropdownHTML += `<div class="store-city-header">${cityState}</div>`;
        
        // Sort stores within city by name
        storesByCity[cityState].sort((a, b) => a.name.localeCompare(b.name));
        
        storesByCity[cityState].forEach(store => {
          const hours = `${store.hours_start} - ${store.hours_end}`;
          const driveThruBadge = store.has_drive_thru ? '<span class="drive-thru-badge">Drive-Thru</span>' : '';
          
          dropdownHTML += `
            <div class="store-item" onclick="selectStore('${store.store_id}')">
              <div class="store-name">${store.name}${driveThruBadge}</div>
              <div class="store-address">${store.address}, ${store.city}, ${store.state} ${store.zip_code}</div>
              <div class="store-hours">Hours: ${hours}</div>
            </div>
          `;
        });
        
        dropdownHTML += `</div>`;
      });
      
      dropdown.innerHTML = dropdownHTML;
    }
    
    function selectStore(storeId) {

      updateSelectedStoreDisplay();

      const storeDropdownContainer = document.querySelector('#storeLocatorButton')?.closest('.dropdown-container');
      if (storeDropdownContainer) {
        storeDropdownContainer.classList.remove('active');
      }
      
      // Store selection in session storage for agent use
      if (selectedStore) {
        sessionStorage.setItem('selectedStore', JSON.stringify(selectedStore));
        console.log('Selected store:', selectedStore);
      }
    }

            dropdownContainer.classList.remove('active');

    function loadInteractiveMenu() {
      const menuContainer = document.getElementById('menu-categories');
      if (!menuContainer) return;
      
      // Group items by category
      const categories = {};
      menuData.forEach(item => {
        if (!categories[item.category]) {
          categories[item.category] = [];
        }
        categories[item.category].push(item);
      });
      
      // Sort items within each category by popularity
      Object.keys(categories).forEach(category => {
        categories[category].sort((a, b) => b.attributes_json.popularity_score - a.attributes_json.popularity_score);
      });
      
      // Create category display names and icons
      const categoryInfo = {
        'coffee': { name: 'Coffees', icon: '☕', description: 'Freshly brewed coffee, espresso, and specialty drinks' },
        'tea': { name: 'Teas', icon: '🍵', description: 'Premium teas and tea-based beverages' },
        'donut': { name: 'Donuts', icon: '🍩', description: 'Fresh donuts with various glazes and fillings' }
      };
      
      // Clear loading message
      menuContainer.innerHTML = '';
      
      // Create expandable categories
      Object.keys(categories).forEach(categoryKey => {
        const category = categoryInfo[categoryKey];
        const items = categories[categoryKey];
        
        const categoryElement = document.createElement('div');
        categoryElement.className = 'menu-category';
        
        categoryElement.innerHTML = `
          <div class="menu-category-header" onclick="toggleCategory('${categoryKey}')">
            <div class="category-info">
              <span class="category-icon">${category.icon}</span>
              <div class="category-text">
                <h3>${category.name}</h3>
                <p>${category.description}</p>
              </div>
            </div>
            <span class="category-arrow">▼</span>
          </div>
          <div class="menu-category-items" id="category-${categoryKey}">
            ${items.map(item => `
              <div class="menu-item-card" onclick="selectMenuItem('${item.item_id}', '${item.name}')">
                <div class="item-header">
                  <h4>${item.name}</h4>
                  <span class="popularity-badge">${item.attributes_json.popularity_score}% ⭐</span>
                </div>
                <div class="item-details">
                  ${item.attributes_json.caffeine_mg ? `<span class="detail-badge caffeine">☕ ${item.attributes_json.caffeine_mg}mg caffeine</span>` : ''}
                  ${item.attributes_json.is_dairy_free ? '<span class="detail-badge dairy-free">🥛 Dairy Free</span>' : ''}
                  ${item.attributes_json.is_sugar_free ? '<span class="detail-badge sugar-free">🍯 Sugar Free</span>' : ''}

              </div>
            `).join('')}
          </div>
        `;
        
        menuContainer.appendChild(categoryElement);
      });
      
      console.log('Interactive menu loaded successfully');
    }
    
    function toggleCategory(categoryKey) {
      const categoryItems = document.getElementById(`category-${categoryKey}`);
      const arrow = categoryItems.parentElement.querySelector('.category-arrow');
      
      if (categoryItems.style.display === 'none' || !categoryItems.style.display) {
        categoryItems.style.display = 'block';
        arrow.style.transform = 'rotate(180deg)';
        categoryItems.parentElement.classList.add('expanded');
      } else {
        categoryItems.style.display = 'none';
        arrow.style.transform = 'rotate(0deg)';
        categoryItems.parentElement.classList.remove('expanded');
      }
    }

      const chatInput = document.getElementById('chatbot-input');
      if (chatInput) {
        chatInput.value = `I'd like to order a ${itemName}`;
        chatInput.focus();
